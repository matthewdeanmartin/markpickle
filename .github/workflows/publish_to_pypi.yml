# .github/workflows/publish_to_pypi.yml

name: Publish to PyPI

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: extractions/setup-just@53165ef7e734c5c07cb06b3c8e7b647c5aa16db3 # v4.0.0
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: '3.14'

      - name: Install uv and pipx
        run: |
          pip install uv && pip install pipx && pipx install uv

      - name: Install global dependencies
        run: |
          pipx install uv && pipx install "coderoller" && \
          pipx install isort && pipx install black && pipx install bandit && \
          pipx install pylint && pipx install pre-commit && pipx install poetry && pipx install hatch

      - name: Install Dependencies
        run: uv sync --all-extras

#      - name: Run just check
#        run: chmod +x scripts/*.sh && uv run make check

      - name: Upload coverage reports to Codecov
        uses: codecov/codecov-action@57e3a136b779b570ffcdbf80b3bdc90e7fab3de2 # v6.0.0
        with:
          token: ${{ secrets.CODECOV_TOKEN }}

      - name: Run make publish
        run: uv run make publish

      - name: Validate wheel contents
        run: |
          pip install check-wheel-contents
          check-wheel-contents dist/*.whl

      - name: Verify wheel is non-empty
        run: |
          python - <<'EOF'
          import zipfile, glob, sys
          wheels = glob.glob("dist/*.whl")
          if not wheels:
              print("ERROR: No wheel found in dist/")
              sys.exit(1)
          for whl in wheels:
              with zipfile.ZipFile(whl) as z:
                  py_files = [f for f in z.namelist() if f.endswith('.py') and 'dist-info' not in f]
                  print(f"{whl}: {len(py_files)} .py files")
                  if len(py_files) < 5:
                      print(f"ERROR: Only {len(py_files)} .py files in wheel — may be empty or broken!")
                      sys.exit(1)
          print("OK: Wheel contents look valid")
          EOF

      - name: Upload Package
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: packages
          path: dist/
          if-no-files-found: error
          retention-days: 1

  pypi-publish:
    name: Upload release to PyPI
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/markpickle
    permissions:
      id-token: write
    needs: build
    steps:
      - name: Fail if branch is not main
        if: github.event_name == 'workflow_dispatch' && github.ref != 'refs/heads/main'
        run: |
          echo "This workflow should not be triggered with workflow_dispatch on a branch other than main"
          exit 1
      - name: Check out code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Download artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: packages
          path: dist/

      - name: Smoke test installed package
        run: |
          pip install dist/*.whl
          python -c "import markpickle; print(markpickle.__version__)"
          python -c "import markpickle; assert hasattr(markpickle, 'dumps'), 'missing dumps'"
          python -c "import markpickle; assert hasattr(markpickle, 'loads'), 'missing loads'"

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b # v1.14.0
